name: "🔄 Regression Tests (Nightly)"

on:
  # schedule:
  #   # Every night at 2:00 AM UTC
  #   - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  regression:
    name: Full Regression Suite (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      BASE_URL: https://qa-practice.netlify.app
      API_BASE_URL: http://localhost:8887
      GRAPHQL_URL: http://localhost:5000/graphql
      CORRECT_EMAIL: ${{ secrets.CORRECT_EMAIL }}
      CORRECT_PASSWORD: ${{ secrets.CORRECT_PASSWORD }}
      INCORRECT_EMAIL: ${{ secrets.INCORRECT_EMAIL }}
      INCORRECT_PASSWORD: ${{ secrets.INCORRECT_PASSWORD }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🎭 Install Playwright browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: 🐳 Start Service Containers
        run: |
          docker run -d --rm --name qa-practice-api -p8887:8081 rvancea/qa-practice-api:latest
          docker run -d --rm --name qa-practice-graphql -p5000:5000 rvancea/qa-practice-graphql:latest
          sleep 5

      - name: 🔄 Run Full Regression Suite (${{ matrix.browser }})
        run: pytest -m regression -v --browser ${{ matrix.browser }} -n auto --alluredir=allure-results

      - name: 📊 Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: 📸 Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 30
