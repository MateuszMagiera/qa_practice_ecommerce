[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts = -p no:warnings --strict-markers --browser chromium --browser firefox --browser webkit -n auto

markers =
    smoke: Critical path tests — run on every PR
    regression: Full regression suite — run nightly
    a11y: Accessibility (WCAG) audit tests powered by axe-core
